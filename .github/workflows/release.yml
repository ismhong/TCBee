name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            zip-arch: x86_64
          - runs-on: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
            zip-arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            llvm clang \
            libelf-dev libclang-dev \
            pkg-config \
            fontconfig libfontconfig1-dev \
            libgl-dev libegl-dev \
            zip

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust Nightly
        run: rustup toolchain install nightly --component rust-src

      - name: Add Rust target
        if: matrix.arch == 'arm64'
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Install bpf-linker
        run: |
          # Download pre-built binary from GitHub releases (uses musl target)
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            ARCHIVE="bpf-linker-aarch64-unknown-linux-musl.tar.gz"
          else
            ARCHIVE="bpf-linker-x86_64-unknown-linux-musl.tar.gz"
          fi
          curl -sSL "https://github.com/aya-rs/bpf-linker/releases/latest/download/$ARCHIVE" | tar -xz -C ~/.cargo/bin/
          chmod +x ~/.cargo/bin/bpf-linker

      - name: Build tcbee-record
        run: |
          cd tcbee-record
          cargo build --release --target ${{ matrix.target }}

      - name: Build tcbee-process (bundled)
        run: |
          cd tcbee-process
          cargo build --release --features ts_storage/bundled --target ${{ matrix.target }}

      - name: Build tcbee-viz
        run: |
          cd tcbee-viz
          cargo build --release --features ts_storage/bundled --target ${{ matrix.target }}

      - name: Build tcbee-live
        run: |
          cd tcbee-live
          cargo build --release --target ${{ matrix.target }}

      - name: Package release zip
        run: |
          mkdir -p release
          cp tcbee-record/target/${{ matrix.target }}/release/tcbee-record release/
          cp tcbee-process/target/${{ matrix.target }}/release/tcbee-process release/
          cp tcbee-viz/target/${{ matrix.target }}/release/tcbee-viz release/
          cp tcbee-live/target/${{ matrix.target }}/release/tcbee-live release/
          cp tcbee release/
          cp LICENSE release/
          cp NOTICES release/
          chmod +x release/tcbee
          zip -j "tcbee-${{ github.ref_name }}-linux-${{ matrix.zip-arch }}.zip" release/*

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: tcbee-${{ matrix.zip-arch }}
          path: "tcbee-${{ github.ref_name }}-linux-${{ matrix.zip-arch }}.zip"
          retention-days: 5

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          find artifacts -type f -name "*.zip"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "TCBee ${{ github.ref_name }}" \
            --generate-notes
          find artifacts -type f -name "*.zip" \
            -exec gh release upload "${{ github.ref_name }}" {} \+